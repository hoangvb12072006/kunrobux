<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mua Robux 120H - AUTOROBUX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0d0d0d; color: #ececec; }
        .sidebar { background-color: #121212; border-right: 1px solid #222; }
        .card { background-color: #181818; border: 1px solid #282828; }
        .input-dark { background-color: #222; border: 1px solid #333; color: white; }
        .input-dark:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 8px rgba(59,130,246,0.3); }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-64 sidebar p-5 flex flex-col hidden md:flex">
        <div class="text-xl font-bold text-white mb-10 flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">A</div>
            AUTOROBUX
        </div>
        <nav class="flex-1 space-y-2">
            <a href="index.html" class="flex items-center p-3 text-gray-400 hover:text-white rounded-md transition"><i class="fas fa-home w-6"></i> Trang chủ</a>
            <a href="mua-robux.html" class="flex items-center p-3 bg-blue-600/20 text-blue-400 border-l-4 border-blue-500 rounded-md"><i class="fas fa-bolt w-6"></i> Mua Robux 120H</a>
            <a href="nap-tien.html" class="flex items-center p-3 text-gray-400 hover:text-white rounded-md transition"><i class="fas fa-wallet w-6"></i> Nạp tiền</a>
        </nav>
        <div class="mt-auto p-3 card rounded-xl">
            <p class="text-xs text-gray-400">Số dư hiện tại:</p>
            <p class="text-lg font-bold text-green-400" id="displayBalance">Đang tải...</p>
        </div>
    </aside>

    <main class="flex-1 p-6 md:p-8 overflow-y-auto">
        <h2 class="text-2xl font-bold mb-6 flex items-center gap-2"><i class="fas fa-shopping-cart text-blue-500"></i> Mua Robux 120H (Gamepass)</h2>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 space-y-6">
                <div class="card p-6 rounded-xl">
                    <div class="bg-blue-900/20 border border-blue-500/30 p-4 rounded-lg mb-6">
                        <p class="text-sm text-blue-200"><i class="fas fa-info-circle mr-2"></i> Tỷ giá hiện tại: <strong>10.000 VNĐ = 75 Robux</strong> (Chưa tính thuế Roblox).</p>
                    </div>

                    <form id="buyForm" class="space-y-5">
                        <div>
                            <label class="block text-sm font-bold text-gray-400 mb-2">Số Robux muốn mua (R$)</label>
                            <div class="relative">
                                <i class="fas fa-gem absolute left-4 top-3.5 text-cyan-400"></i>
                                <input type="number" id="robuxAmount" min="10" placeholder="Nhập số Robux..." class="input-dark w-full p-3 pl-10 rounded-lg" required>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-400 mb-2">Đường dẫn Gamepass (Link)</label>
                            <div class="relative">
                                <i class="fas fa-link absolute left-4 top-3.5 text-gray-500"></i>
                                <input type="url" id="gamepassLink" placeholder="https://www.roblox.com/game-pass/..." class="input-dark w-full p-3 pl-10 rounded-lg" required>
                            </div>
                        </div>

                        <div class="bg-gray-800/50 p-4 rounded-lg space-y-3">
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-400">Số tiền cần thanh toán:</span>
                                <span class="font-bold text-yellow-400 text-lg" id="vndCost">0 VNĐ</span>
                            </div>
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-400">Robux bạn sẽ nhận (Sau thuế 30%):</span>
                                <span class="font-bold text-cyan-400" id="robuxReceive">0 R$</span>
                            </div>
                        </div>

                        <button type="submit" id="btnBuy" class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-lg transition shadow-lg shadow-blue-900/50 flex justify-center items-center gap-2">
                            <i class="fas fa-check-circle"></i> THỰC HIỆN THANH TOÁN
                        </button>
                    </form>
                </div>
            </div>

            <div class="card p-6 rounded-xl h-fit">
                <h3 class="font-bold mb-4 border-b border-gray-700 pb-2">Lịch Sử Mua Gần Đây</h3>
                <div id="historyList" class="space-y-4">
                    <p class="text-sm text-gray-500 text-center py-4">Chưa có giao dịch nào...</p>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, addDoc, serverTimestamp, query, where, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Cấu hình Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBmggvvk19HmgnFxy-rAe_SvvyOwnKXprc",
            authDomain: "kunrobux-c8aa8.firebaseapp.com",
            projectId: "kunrobux-c8aa8",
            storageBucket: "kunrobux-c8aa8.firebasestorage.app",
            messagingSenderId: "1094974396607",
            appId: "1:1094974396607:web:61cf45e19d63e31aca4e0a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let currentBalance = 0;

        // TỶ GIÁ: 10,000đ = 75 Robux => 1 Robux = 133.33đ
        const RATE_PER_ROBUX = 10000 / 75; 

        // 1. Kiểm tra đăng nhập
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                loadUserData(user.uid);
                loadOrderHistory(user.uid);
            } else {
                alert("Bạn cần đăng nhập để mua Robux!");
                window.location.href = "login.html"; // Đá về trang login
            }
        });

        // 2. Tải số dư người dùng
        async function loadUserData(uid) {
            const userRef = doc(db, "users", uid);
            const userSnap = await getDoc(userRef);
            if (userSnap.exists()) {
                currentBalance = userSnap.data().balance || 0;
                document.getElementById('displayBalance').innerText = currentBalance.toLocaleString('vi-VN') + ' đ';
            } else {
                // Tạo profile mặc định nếu chưa có
                await setDoc(userRef, { balance: 0, username: currentUser.email });
                document.getElementById('displayBalance').innerText = '0 đ';
            }
        }

        // 3. Logic Tự động tính tiền khi gõ số Robux
        const robuxInput = document.getElementById('robuxAmount');
        const vndCostDisplay = document.getElementById('vndCost');
        const robuxReceiveDisplay = document.getElementById('robuxReceive');

        robuxInput.addEventListener('input', () => {
            const robux = parseInt(robuxInput.value) || 0;
            const cost = Math.ceil(robux * RATE_PER_ROBUX);
            const receive = Math.floor(robux * 0.7); // Thuế Roblox 30%

            vndCostDisplay.innerText = cost.toLocaleString('vi-VN') + ' VNĐ';
            robuxReceiveDisplay.innerText = receive.toLocaleString('vi-VN') + ' R$';
            
            // Đổi màu nếu không đủ tiền
            if (cost > currentBalance) {
                vndCostDisplay.classList.replace('text-yellow-400', 'text-red-500');
            } else {
                vndCostDisplay.classList.replace('text-red-500', 'text-yellow-400');
            }
        });

        // 4. Xử lý Mua hàng (Trừ tiền & Lưu Database)
        document.getElementById('buyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const robux = parseInt(robuxInput.value);
            const link = document.getElementById('gamepassLink').value;
            const cost = Math.ceil(robux * RATE_PER_ROBUX);

            if (cost > currentBalance) {
                return alert("Thất bại: Số dư của bạn không đủ! Vui lòng nạp thêm.");
            }

            const btnBuy = document.getElementById('btnBuy');
            btnBuy.disabled = true;
            btnBuy.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ĐANG XỬ LÝ...';

            try {
                // Trừ tiền trong collection 'users'
                const userRef = doc(db, "users", currentUser.uid);
                await updateDoc(userRef, {
                    balance: currentBalance - cost
                });

                // Lưu đơn hàng vào collection 'orders'
                await addDoc(collection(db, "orders"), {
                    uid: currentUser.uid,
                    email: currentUser.email,
                    robuxAmount: robux,
                    costVND: cost,
                    gamepassLink: link,
                    status: "Đang chờ", // Trạng thái chờ admin xử lý
                    createdAt: serverTimestamp()
                });

                alert(`Thành công! Bạn đã đặt mua ${robux} R$. Đơn hàng đang chờ xử lý.`);
                
                // Reset form & Tải lại dữ liệu
                document.getElementById('buyForm').reset();
                vndCostDisplay.innerText = '0 VNĐ';
                robuxReceiveDisplay.innerText = '0 R$';
                loadUserData(currentUser.uid);
                loadOrderHistory(currentUser.uid);

            } catch (error) {
                console.error(error);
                alert("Lỗi hệ thống: " + error.message);
            } finally {
                btnBuy.disabled = false;
                btnBuy.innerHTML = '<i class="fas fa-check-circle"></i> THỰC HIỆN THANH TOÁN';
            }
        });

        // 5. Tải lịch sử mua hàng
        async function loadOrderHistory(uid) {
            const historyList = document.getElementById('historyList');
            const q = query(collection(db, "orders"), where("uid", "==", uid), orderBy("createdAt", "desc"), limit(5));
            const querySnapshot = await getDocs(q);
            
            if (querySnapshot.empty) return;

            historyList.innerHTML = '';
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const statusColor = data.status === "Đang chờ" ? "text-yellow-500" : "text-green-500";
                
                historyList.innerHTML += `
                    <div class="flex justify-between items-center border-b border-gray-800 pb-3 text-sm">
                        <div>
                            <div class="font-bold text-gray-300">${data.robuxAmount} R$</div>
                            <div class="${statusColor} text-xs">${data.status}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-red-400 font-bold">-${data.costVND.toLocaleString('vi-VN')}đ</div>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
