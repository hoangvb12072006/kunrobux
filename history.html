<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch Sử Mua Hàng - KUNROBUX</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Signika:wght@500;600;700;800&display=swap">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --light: #111111; --light-bg: #000000; --grey: #151a23; --dark: #F9F9F9; --dark-grey: #AAB0CC; --blue: #1BBEFB; --border-light: #222222; }
        body { background: var(--light-bg); color: var(--dark); font-family: 'Signika', sans-serif; }
        #sidebar { position: fixed; width: 260px; height: 100vh; background: var(--light); border-right: 1px solid var(--border-light); z-index: 100; transition: 0.3s; overflow-x: hidden; }
        #content { margin-left: 260px; width: calc(100% - 260px); min-height: 100vh; transition: 0.3s; }
        #sidebar.collapsed { width: 76px; }
        #sidebar.collapsed ~ #content { margin-left: 76px; width: calc(100% - 76px); }
        .side-menu a { display: flex; align-items: center; padding: 12px 15px; color: var(--dark-grey); text-decoration: none; border-radius: 10px; font-weight: 600; margin-bottom: 4px; }
        .side-menu a.active-gradient { background: linear-gradient(135deg, #6A67FE 0%, #4F80E2 100%); color: white; }
        .history-table { width: 100%; border-collapse: collapse; background: #151a23; border-radius: 12px; overflow: hidden; }
        .history-table th { background: #1f2937; color: var(--dark-grey); text-align: left; padding: 15px; font-size: 13px; text-transform: uppercase; }
        .history-table td { padding: 15px; border-bottom: 1px solid #222222; font-size: 14px; }
        .status-badge { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 700; }
    </style>
</head>
<body>
    <section id="sidebar">
        <div class="p-5 font-bold text-2xl flex items-center gap-2"><img src="https://autorobux.vn/icon/logo.png" width="30"> KUNROBUX</div>
        <ul class="side-menu p-3">
            <li class="text-[11px] text-gray-500 uppercase font-bold px-3 mb-2">Main</li>
            <li><a href="index.html"><i class='bx bxs-home mr-2'></i> Trang chủ</a></li>
            <li class="text-[11px] text-gray-500 uppercase font-bold px-3 mt-4 mb-2">Quản lý</li>
            <li><a href="history.html" class="active-gradient"><i class='bx bx-cart mr-2'></i> Lịch sử mua hàng</a></li>
            <li><a href="nap-tien.html"><i class='bx bx-dollar mr-2'></i> Nạp tiền</a></li>
            <li><a href="transactions.html"><i class='bx bx-credit-card mr-2'></i> Biến động số dư</a></li>
        </ul>
    </section>

    <section id="content">
        <nav class="h-16 flex items-center px-6 border-b border-[#222222] bg-[#111111] sticky top-0 z-50">
            <i class='bx bx-menu text-2xl cursor-pointer mr-4 toggle-sidebar'></i>
            <span class="font-bold text-[#1BBEFB]">LỊCH SỬ MUA HÀNG</span>
        </nav>
        <main class="p-6">
            <div class="bg-[#151a23] p-6 rounded-2xl border border-[#222222]">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>Mã Đơn</th>
                            <th>Dịch vụ</th>
                            <th>Thông tin</th>
                            <th>Số tiền</th>
                            <th>Thời gian</th>
                            <th>Trạng thái</th>
                        </tr>
                    </thead>
                    <tbody id="history-list">
                        <tr>
                            <td colspan="6" class="text-center text-gray-500 py-10 italic">Đang tải dữ liệu...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBmggevk19HmgnFxy-rAe_SvvyOwnKXprc", authDomain: "kunrobux-c8aa8.firebaseapp.com", projectId: "kunrobux-c8aa8", storageBucket: "kunrobux-c8aa8.firebasestorage.app", messagingSenderId: "1094974396607", appId: "1:1094974396607:web:61cf45e19d63e31aca4e0a" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const q = query(collection(db, "orders"), where("userId", "==", user.uid), orderBy("time", "desc"));
                const querySnapshot = await getDocs(q);
                const list = document.getElementById('history-list');
                list.innerHTML = "";
                if (querySnapshot.empty) {
                    list.innerHTML = "<tr><td colspan='6' class='text-center py-10 text-gray-500'>Bạn chưa có đơn hàng nào.</td></tr>";
                }
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    list.innerHTML += `
                        <tr>
                            <td class="font-bold text-[#1BBEFB]">#${doc.id.slice(0,6).toUpperCase()}</td>
                            <td>${data.serviceType}</td>
                            <td><span class="text-xs text-gray-400">User:</span> ${data.robloxUser}</td>
                            <td class="font-bold">₫${data.amount.toLocaleString()}</td>
                            <td class="text-xs text-gray-500">${data.time.toDate().toLocaleString()}</td>
                            <td><span class="status-badge ${data.status === 'Thành công' ? 'bg-green-500/20 text-green-500' : 'bg-yellow-500/20 text-yellow-500'}">${data.status}</span></td>
                        </tr>`;
                });
            }
        });
    </script>
</body>
</html>
